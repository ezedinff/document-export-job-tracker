name: CI

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'eslint.config.js'
      - 'jest*.js'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'eslint.config.js'
      - 'jest*.js'
  workflow_dispatch:

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: fast-checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run integration tests
        env:
          DB_PATH: data/test.db
          EXPORT_DIR: exports
        run: npm run test:integration

  ui-smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: browser-actions/setup-chrome@v1
      - run: npm ci
      - name: Run Selenium smoke tests
        env:
          DB_PATH: data/test.db
          EXPORT_DIR: exports
        run: npm run test:e2e
      - name: Upload UI artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-artifacts
          path: artifacts/ui
          if-no-files-found: warn

  docker-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ui-smoke-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Compute short SHA tag
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/document-export-job-tracker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/document-export-job-tracker:${{ env.SHORT_SHA }}

